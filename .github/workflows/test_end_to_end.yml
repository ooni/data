name: End to End Data Pipeline Test

on:
  push:
    branches:
      - main
      - add_end_to_end_tests

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: cache inputs and outputs
        uses: actions/cache@v5
        with:
          key: data-cache-${{ github.run_id }}
          restore-keys: |
            data-cache-
          path: |
            tests/integration/data
            tests/integration/fastpath

      - name: Install Podman
        run: |
          sudo apt update
          sudo apt install -y podman podman-compose

      - name: Run Docker Compose with Podman (detached)
        run: |
          cd tests/integration
          export PODMAN_HOST=unix:///run/user/$(id -u)/podman/podman.sock
          podman system service -t0 &
          podman compose up

      - name: Wait for verifier to start
        run: |
          cd tests/integration
          for i in $(seq 1 60); do
            if podman ps --format "{{.Names}}" | grep -q '^verifier$'; then
              echo "verifier started"
              exit 0
            fi
            sleep 10
          done
          echo "verifier did not start within timeout" >&2
          podman ps -a
          exit 1

      - name: Stream verifier logs until it exits
        run: |
          cd tests/integration
          # Start streaming logs; podman logs --follow will exit when the container stops.
          podman logs --follow verifier & LOG_PID=$!
          # Wait for verifier container to stop, with a timeout (360*5s = 30 minutes).
          for i in $(seq 1 360); do
            if ! podman ps --format "{{.Names}}" | grep -q '^verifier$'; then
              echo "verifier exited"
              break
            fi
            sleep 5
          done
          # If still running after timeout, show debugging info and fail.
          if podman ps --format "{{.Names}}" | grep -q '^verifier$'; then
            echo "verifier did not finish within timeout" >&2
            podman ps -a
            podman logs verifier || true
            if ps -p $LOG_PID > /dev/null; then
              kill $LOG_PID || true
            fi
            exit 1
          fi
          # Wait for the logs follower to finish and show final logs if any.
          if ps -p $LOG_PID > /dev/null; then
            wait $LOG_PID || true
          fi
          podman ps -a --filter name=verifier --format "Container: {{.Names}} Status: {{.Status}}"
          podman logs verifier || true

      - name: Shutdown remaining services
        run: |
          cd tests/integration
          podman-compose down --remove-orphans
